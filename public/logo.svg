<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="verdantGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5EEAD4" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C2028" />
      <stop offset="100%" stop-color="#0D0F12" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <mask id="cutout">
      <rect width="512" height="512" fill="white" />
      <circle cx="216" cy="296" r="10" fill="black"/>
      <circle cx="256" cy="296" r="10" fill="black"/>
      <circle cx="296" cy="296" r="10" fill="black"/>
    </mask>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  
  <g transform="translate(0, -12)">
    <!-- Outer Glow -->
    <g filter="url(#glow)" opacity="0.45" mask="url(#cutout)">
      <circle cx="256" cy="140" r="38" fill="url(#verdantGrad)"/>
      <path d="M 200 200 h 112 a 48 48 0 0 1 48 48 v 96 a 48 48 0 0 1 -48 48 h -32 l -32 32 l -8 -32 h -40 a 48 48 0 0 1 -48 -48 v -96 a 48 48 0 0 1 48 -48 Z" fill="url(#verdantGrad)"/>
    </g>

    <!-- Main Graphic -->
    <g mask="url(#cutout)">
      <circle cx="256" cy="140" r="38" fill="url(#verdantGrad)"/>
      <path d="M 200 200 h 112 a 48 48 0 0 1 48 48 v 96 a 48 48 0 0 1 -48 48 h -32 l -32 32 l -8 -32 h -40 a 48 48 0 0 1 -48 -48 v -96 a 48 48 0 0 1 48 -48 Z" fill="url(#verdantGrad)"/>
    </g>
  </g>
</svg>
